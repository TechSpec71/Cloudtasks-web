<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; --sidebar-w: 260px; --success: #00ffa3; }
        
        * { box-sizing: border-box; } 

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0; min-height: 100vh; color: white;
            display: flex;
        }

        /* --- MOBILE HEADER --- */
        .mobile-header {
            display: none; width: 100%; padding: 15px 20px;
            background: rgba(22, 33, 62, 0.95); position: fixed; top: 0; z-index: 200;
            justify-content: space-between; align-items: center; backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-w);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
            padding: 30px 20px;
            height: 100vh; position: fixed;
            z-index: 300; transition: 0.3s ease;
        }

        .close-menu { display: none; position: absolute; top: 20px; right: 20px; font-size: 24px; cursor: pointer; }

        .logo {
            font-size: 24px; font-weight: bold; display: flex;
            align-items: center; gap: 12px; color: white;
            text-decoration: none; margin-bottom: 40px;
        }
        .logo i { color: var(--primary); font-size: 28px; }

        .nav-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 15px; border-radius: 12px;
            color: #b0b0b0; text-decoration: none;
            transition: 0.3s; margin-bottom: 8px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 20px; text-align: center; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1; margin-left: var(--sidebar-w);
            padding: 40px; min-height: 100vh; width: 100%;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- TASK GRID STYLES --- */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 25px;
            transition: 0.3s ease; position: relative;
        }
        
        .task-card .loc { font-size: 11px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .task-card h3 { font-size: 16px; margin: 10px 0; height: 40px; overflow: hidden; }
        .task-card .price { font-size: 20px; color: var(--success); font-weight: bold; margin-bottom: 15px; }

        /* --- PROFILE CARD STYLES --- */
        .container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 20px; width: 100%; max-width: 900px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px;
            position: relative; transition: 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .number-tag {
            position: absolute; top: -10px; left: -10px; background: var(--primary);
            width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 16px;
        }

        .btn-update, .btn-select {
            background: var(--primary); color: white; border: none; padding: 12px 20px;
            border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; width: 100%;
        }

        /* --- MODAL STYLES --- */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #16213e; margin: 10% auto; padding: 30px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--primary); }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; outline: none; }

        /* --- RESPONSIVE DESIGN --- */
        @media (max-width: 992px) {
            .sidebar { left: -100%; } 
            .sidebar.show { left: 0; }
            .close-menu { display: block; }
            .main-content { margin-left: 0; padding: 100px 20px 40px; }
            .mobile-header { display: flex; }
            .container { grid-template-columns: 1fr; } 
            .task-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="mobile-header">
        <div class="logo" style="margin-bottom:0; font-size: 20px;">
            <i class="fa-solid fa-cloud"></i> <span>CloudTasks</span>
        </div>
        <i class="fa-solid fa-bars" style="font-size: 24px; cursor:pointer;" onclick="toggleMenu()"></i>
    </div>

    <div class="sidebar" id="sidebar">
        <i class="fa-solid fa-xmark close-menu" onclick="toggleMenu()"></i>
        <div class="logo">
            <i class="fa-solid fa-cloud"></i>
            <span>CloudTasks</span>
        </div>

        <div class="nav-item active" onclick="showView('homeView', this)">
            <i class="fa-solid fa-house"></i> Home Page
        </div>
        <div class="nav-item" onclick="showView('profileView', this)">
            <i class="fa-solid fa-user-circle"></i> User Profile
        </div>
        <div class="nav-item" onclick="showView('tasksView', this)">
            <i class="fa-solid fa-list-check"></i> Available Tasks
        </div>
        <div class="nav-item" onclick="showView('projectsView', this)">
            <i class="fa-solid fa-spinner"></i> My Projects
        </div>
        <div class="nav-item" onclick="showView('walletView', this)">
            <i class="fa-solid fa-wallet"></i> My Wallet
        </div>
        <div class="nav-item" onclick="showView('historyView', this)">
            <i class="fa-solid fa-clock-rotate-left"></i> History
        </div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" onclick="showView('supportView', this)">
                <i class="fa-solid fa-circle-question"></i> Help & Support
            </div>
            <div class="nav-item" style="color: #e74c3c;">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </div>
        </div>
    </div>

    <div class="main-content">
        <div id="homeView" class="view-section active">
            <h1>Welcome to CloudTasks</h1>
            <p>Your dashboard overview will appear here.</p>
        </div>

        <div id="profileView" class="view-section">
            <div class="container">
                <div class="glass-card">
                    <div class="number-tag">01</div>
                    <div class="icon"><i class="fa-solid fa-user-gear" style="font-size: 24px; color: var(--primary);"></i></div>
                    <h3>Personal Profile</h3>
                    <p>Manage account settings and contact information.</p>
                    <button class="btn-update" onclick="openModal('personalModal')">UPDATE INFO</button>
                </div>
                </div>
        </div>

        <div id="tasksView" class="view-section">
            <h1>Available Tasks</h1>
            <div class="task-grid" id="taskGrid"></div>
        </div>
    </div>

    <div id="personalModal" class="modal">
        <div class="modal-content">
            <h2>Personal Info</h2>
            <input type="text" placeholder="First Name">
            <input type="text" placeholder="Last Name">
            <input type="email" placeholder="Email Address">
            <button class="btn-update" onclick="closeModal('personalModal')">Save Changes</button>
        </div>
    </div>

    <script>
        // NEW: Toggle function for mobile sidebar
        function toggleMenu() {
            document.getElementById('sidebar').classList.toggle('show');
        }

        function showView(viewId, element) {
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.getElementById(viewId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            element.classList.add('active');
            // Close sidebar automatically on mobile after clicking a link
            if(window.innerWidth <= 992) toggleMenu();
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // --- TASK GENERATOR (Exactly as you had it) ---
        const grid = document.getElementById('taskGrid');
        const tasks = ["AI Trainer", "Data Entry", "Social Media Moderator", "Japanese Translator", "Audio Transcription", "Virtual Assistant"];
        for(let i=0; i<6; i++) {
            const randomTask = tasks[Math.floor(Math.random() * tasks.length)];
            const randomPrice = Math.floor(Math.random() * 30) + 10;
            grid.innerHTML += `
                <div class="task-card">
                    <span class="loc">Worldwide - Remote</span>
                    <h3>${randomTask} Specialist</h3>
                    <p class="price">$${randomPrice} per HR</p>
                    <button class="btn-select">Select Task</button>
                </div>`;
        }

        window.onclick = function(event) { if (event.target.className === 'modal') event.target.style.display = 'none'; }
    </script>
</body>
</html>
