<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudtasks | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            margin: 0;
            background: #000000;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 🔄 Retained Loading Screen */
        .loader-container {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100%;
            position: fixed;
            background: #000;
            z-index: 9999;
        }

        .logo-spinner {
            width: 80px;
            height: 80px;
            border: 4px solid transparent; 
            border-top: 4px solid #6c5ce7;
            border-radius: 50%;
            animation: spin-outline 1.5s linear infinite;
            margin-bottom: 25px;
        }

        @keyframes spin-outline {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #00bcd4;
            font-size: 1.2rem;
            font-weight: 500;
            letter-spacing: 1px;
        }

        /* 📱 Dashboard Layout */
        .header {
            width: 100%;
            max-width: 1200px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #222;
            box-sizing: border-box;
        }

        .status-badge {
            padding: 6px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .unverified { background: rgba(231, 76, 60, 0.15); color: #e74c3c; border: 1px solid #e74c3c; }
        .pending { background: rgba(243, 156, 18, 0.15); color: #f39c12; border: 1px solid #f39c12; }

        .btn-get-access {
            background: #00bcd4;
            color: black;
            border: none;
            padding: 14px 30px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            margin-top: 20px;
        }

        .btn-get-access:hover { background: #0097a7; transform: translateY(-2px); }

        /* 💰 Manual Payment Modal (No Paystack Traces) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-content {
            background: #111;
            padding: 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid #333;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .payment-box {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px dashed #444;
        }

        input {
            width: 100%;
            padding: 14px;
            margin: 15px 0;
            background: #000;
            border: 1px solid #444;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
            text-transform: uppercase;
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 2px;
            text-align: center;
        }

        input:focus { border-color: #00bcd4; outline: none; }
    </style>
</head>
<body>

    <div id="loader" class="loader-container">
        <div class="logo-spinner"></div>
        <p class="loading-text">Loading Cloudtasks</p>
    </div>

    <div class="header">
        <h2 style="margin:0; letter-spacing: -1px;">Cloudtasks</h2>
        <div id="accountStatus" class="status-badge unverified">
            <i class="fa-solid fa-circle-xmark"></i> Unverified
        </div>
    </div>

    <div style="margin-top: 15vh; text-align: center; padding: 20px;">
        <i class="fa-solid fa-rocket" style="font-size: 50px; color: #6c5ce7; margin-bottom: 20px;"></i>
        <h1 style="margin: 10px 0;">Ready to start?</h1>
        <p style="color: #888; max-width: 300px; margin: 0 auto 20px;">Unlock premium server-side tasks and daily payouts by activating your account.</p>
        <button class="btn-get-access" onclick="openPaymentModal()">GET ACCESS NOW</button>
    </div>

    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <i class="fa-solid fa-mobile-screen-button" style="font-size: 40px; color: #00bcd4; margin-bottom: 10px;"></i>
            <h2 style="margin: 10px 0;">Lipa na M-PESA</h2>
            <p style="font-size: 14px; color: #aaa;">Please pay <b>KES 1,000</b> to the details below:</p>
            
            <div class="payment-box">
                <p style="margin:0; font-size:12px; color: #888; text-transform: uppercase;">M-Pesa Number</p>
                <h1 style="margin:8px 0; color:#2ecc71; letter-spacing: 1px;">0712345678</h1>
                <p style="margin:0; font-size:12px; font-weight: bold;">RITA WAMBURU</p>
            </div>

            <p style="font-size: 13px; margin-bottom: 5px;">Enter your <b>Transaction Code</b>:</p>
            <input type="text" id="mpesaCode" placeholder="E.g. RCL8WQ2K9S" maxlength="10">
            
            <button class="btn-get-access" style="width: 100%; margin-top: 10px;" onclick="submitCode()">VERIFY PAYMENT</button>
            <p onclick="closeModal()" style="margin-top:20px; cursor:pointer; font-size:13px; color:#555; font-weight: 500;">Cancel and Return</p>
        </div>
    </div>

    <script>
        // Simulate Loading Finish
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
            }, 2000);
        });

        function openPaymentModal() {
            document.getElementById('paymentModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('paymentModal').style.display = 'none';
        }

        function submitCode() {
            const codeInput = document.getElementById('mpesaCode');
            const code = codeInput.value.trim();
            
            if (code.length < 8) {
                alert("Invalid Code. Please enter the 10-digit M-Pesa transaction code.");
                return;
            }

            // Update UI to show Pending Status
            const badge = document.getElementById('accountStatus');
            badge.className = "status-badge pending";
            badge.innerHTML = '<i class="fa-solid fa-clock"></i> Verification Pending';

            alert("Confirmation: Your code " + code + " has been sent for manual cross-check. Access will be granted shortly.");
            closeModal();

            // Clear the input for security
            codeInput.value = "";
        }
    </script>
</body>
</html>
