<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0; min-height: 100vh; color: white;
            display: flex; flex-direction: column;
        }

        /* Top Navigation - Preserved */
        nav { width: 100%; padding: 20px 40px; display: flex; align-items: center; box-sizing: border-box; }
        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 12px; color: white; text-decoration: none; }
        .logo i { color: var(--primary); font-size: 28px; }

        /* Grid Container - Restored to 2x2 */
        .main-content { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 0; }
        .container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); /* This fixes the layout back to 2 columns */
            gap: 30px; 
            width: 90%; 
            max-width: 900px; 
        }

        /* Glass Cards - Preserved Design */
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 40px; position: relative; 
            transition: 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .number-tag {
            position: absolute; top: -15px; left: -15px; background: var(--primary);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
        }
        
        h3 { margin: 15px 0 10px; text-transform: uppercase; font-size: 18px; color: #fff; }
        p { font-size: 14px; color: #b0b0b0; line-height: 1.6; margin-bottom: 20px; }
        .icon { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        .btn-update { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }

        /* Modals & Upload Labels - Preserved */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #16213e; margin: 5% auto; padding: 35px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--primary); }
        .file-upload-label { display: block; padding: 15px; background: #0d1117; border: 1px dashed #30363d; border-radius: 8px; text-align: center; cursor: pointer; margin: 10px 0; font-size: 13px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <nav>
        <div class="logo"><i class="fa-solid fa-cloud"></i><span>CloudTasks</span></div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="glass-card">
                <div class="number-tag">01</div>
                <div class="icon"><i class="fa-solid fa-user-gear"></i></div>
                <h3>Personal Profile</h3>
                <p>Manage your account settings and contact info.</p>
                <button class="btn-update" onclick="openModal('personalModal')">UPDATE INFO</button>
            </div>

            <div class="glass-card">
                <div class="number-tag">02</div>
                <div class="icon"><i class="fa-solid fa-graduation-cap"></i></div>
                <h3>Educational Profile</h3>
                <p>Showcase your academic level and certifications.</p>
                <button class="btn-update" onclick="openModal('eduModal')">UPDATE EDUCATION</button>
            </div>

            <div class="glass-card">
                <div class="number-tag">03</div>
                <div class="icon"><i class="fa-solid fa-id-card-clip"></i></div>
                <h3>Identity Verification</h3>
                <p>Verify your identity for full access.</p>
                <button class="btn-update" onclick="openModal('idModal')">VERIFY IDENTITY</button>
            </div>

            <div class="glass-card">
                <div class="number-tag">04</div>
                <div class="icon"><i class="fa-solid fa-layer-group"></i></div>
                <h3>Task/Member Access</h3>
                <p>Control permissions and manage workspace roles.</p>
            </div>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }
        window.onclick = function(event) { if (event.target.className === 'modal') { event.target.style.display = 'none'; } }
    </script>
</body>
</html>
