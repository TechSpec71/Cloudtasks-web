<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; --sidebar-w: 260px; }
        * { box-sizing: border-box; } 
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #1a1a2e;
            margin: 0; min-height: 100vh; color: white; display: flex;
        }

        .sidebar {
            width: var(--sidebar-w); background: #000;
            display: flex; flex-direction: column; padding: 30px 20px;
            height: 100vh; position: fixed; z-index: 300;
        }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px;
            color: #b0b0b0; cursor: pointer; margin-bottom: 8px;
        }
        .nav-item.active { background: var(--primary); color: white; }

        .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; }
        
        /* THE KEY FIX: Ensure views are hidden by default */
        .view-section { display: none !important; }
        .view-section.active { display: block !important; }

        .verification-notice {
            text-align: center; margin-top: 50px; padding: 40px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
            border: 2px dashed var(--primary);
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="nav-item active" onclick="changeView('homeView', this)"> <i class="fa-solid fa-house"></i> Home Page </div>
        <div id="profileBtn" class="nav-item" onclick="changeView('profileView', this)"> <i class="fa-solid fa-user-circle"></i> User Profile </div>
        
        <div class="nav-item" onclick="changeRestricted('Available Tasks', this)"> <i class="fa-solid fa-list-check"></i> Available Tasks </div>
        <div class="nav-item" onclick="changeRestricted('My Projects', this)"> <i class="fa-solid fa-spinner"></i> My Projects </div>
        <div class="nav-item" onclick="changeRestricted('My Wallet', this)"> <i class="fa-solid fa-wallet"></i> My Wallet </div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" style="color: #ff4d4d;" onclick="forceLogout()"> <i class="fa-solid fa-right-from-bracket"></i> Logout </div>
        </div>
    </div>

    <div class="main-content">
        <div id="homeView" class="view-section active">
            <h1>Welcome to CloudTasks</h1>
        </div>

        <div id="profileView" class="view-section">
            <h1>User Profile</h1>
            <p>Your ID and info go here.</p>
        </div>

        <div id="restrictedView" class="view-section">
            <div class="verification-notice">
                <i class="fa-solid fa-lock" style="font-size: 50px; color: #ff4d4d; margin-bottom: 20px;"></i>
                <h2 id="sectionName">Section</h2>
                <h3>Membership Verification Required</h3>
                <p>Complete your profile to unlock this feature.</p>
                <button style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer;" onclick="changeView('profileView', document.getElementById('profileBtn'))">Go to Profile</button>
            </div>
        </div>
    </div>

    <script>
        // Use ONE function to clear all states
        function clearAll() {
            const sections = document.querySelectorAll('.view-section');
            const navs = document.querySelectorAll('.nav-item');
            
            sections.forEach(s => s.classList.remove('active'));
            navs.forEach(n => n.classList.remove('active'));
        }

        function changeView(viewId, element) {
            clearAll();
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
        }

        function changeRestricted(name, element) {
            clearAll();
            document.getElementById('restrictedView').classList.add('active');
            document.getElementById('sectionName').innerText = name;
            element.classList.add('active');
        }

        function forceLogout() {
            // Clears everything and goes to login
            localStorage.clear();
            sessionStorage.clear();
            window.location.replace('login.html');
        }
    </script>
</body>
</html>
