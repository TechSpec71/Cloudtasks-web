<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; }
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0; min-height: 100vh; color: white;
            display: flex; flex-direction: column;
        }

        /* Top Navigation with Logo */
        nav {
            width: 100%;
            padding: 20px 40px;
            display: flex;
            align-items: center;
            box-sizing: border-box;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
        }
        .logo i { color: var(--primary); font-size: 28px; }

        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding-bottom: 50px;
        }

        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 30px; width: 90%; max-width: 900px; }
        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 40px; position: relative; 
            transition: 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        .number-tag {
            position: absolute; top: -15px; left: -15px; background: var(--primary);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 18px;
        }
        h3 { margin: 15px 0 10px; text-transform: uppercase; font-size: 18px; color: #fff; }
        p { font-size: 14px; color: #b0b0b0; line-height: 1.6; margin-bottom: 20px; }
        .icon { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
        .btn-update { background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-update:hover { box-shadow: 0 0 15px var(--primary); opacity: 0.9; }

        /* Modal Styles */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); }
        .modal-content { background: #16213e; margin: 5% auto; padding: 35px; border-radius: 20px; width: 90%; max-width: 450px; border: 1px solid var(--primary); box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .modal-content h2 { margin-top: 0; font-size: 22px; text-align: center; margin-bottom: 10px; }
        
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: white; box-sizing: border-box; outline: none; }
        
        /* File Upload Styling */
        .file-upload-label {
            display: block; padding: 15px; background: #0d1117; border: 1px dashed #30363d;
            border-radius: 8px; text-align: center; cursor: pointer; margin: 10px 0; font-size: 13px; color: #b0b0b0;
        }
        .file-upload-label:hover { border-color: var(--primary); color: white; }
        input[type="file"] { display: none; }

        .phone-row { display: flex; gap: 10px; }
        .prefix-box { width: 90px !important; text-align: center; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fa-solid fa-cloud"></i>
            <span>CloudTasks</span>
        </div>
    </nav>

    <div class="main-content">
        <div class="container">
            <div class="glass-card">
                <div class="number-tag">01</div>
                <div class="icon"><i class="fa-solid fa-user-gear"></i></div>
                <h3>Personal Profile</h3>
                <p>Manage your account settings, contact information, and personal preferences.</p>
                <button class="btn-update" onclick="openModal('personalModal')">UPDATE INFO</button>
