<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; --sidebar-w: 260px; }
        * { box-sizing: border-box; } 
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; margin: 0; display: flex; color: white; }

        .sidebar {
            width: var(--sidebar-w); background: #000; height: 100vh;
            position: fixed; display: flex; flex-direction: column; padding: 20px;
        }
        .nav-item {
            padding: 12px; color: #b0b0b0; cursor: pointer; margin-bottom: 5px;
            display: flex; align-items: center; gap: 10px; border-radius: 8px;
        }
        .nav-item.active { background: var(--primary); color: white; }

        .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; }
        
        /* This forces the sections to hide unless they have the 'active' class */
        .view-section { display: none !important; }
        .view-section.active { display: block !important; }

        .lock-box {
            text-align: center; border: 2px dashed var(--primary);
            padding: 40px; border-radius: 20px; background: rgba(255,255,255,0.03);
            margin-top: 50px;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CloudTasks</h2>
        <div class="nav-item active" onclick="go('home')"> <i class="fa fa-home"></i> Home </div>
        <div id="pBtn" class="nav-item" onclick="go('profile')"> <i class="fa fa-user"></i> Profile </div>
        
        <div class="nav-item" onclick="goLock('Available Tasks')"> <i class="fa fa-list"></i> Tasks </div>
        <div class="nav-item" onclick="goLock('My Projects')"> <i class="fa fa-tasks"></i> Projects </div>
        <div class="nav-item" onclick="goLock('My Wallet')"> <i class="fa fa-wallet"></i> Wallet </div>
        
        <div class="nav-item" style="margin-top:auto; color:#ff4d4d" onclick="out()"> <i class="fa fa-sign-out"></i> Logout </div>
    </div>

    <div class="main-content">
        <div id="home" class="view-section active"> <h1>Welcome Home</h1> </div>
        <div id="profile" class="view-section"> <h1>User Profile</h1> </div>
        
        <div id="restricted" class="view-section">
            <div class="lock-box">
                <i class="fa fa-lock" style="font-size: 50px; color: #ff4d4d"></i>
                <h2 id="lockTitle">Restricted</h2>
                <p>Membership Verification Required</p>
                <button onclick="go('profile')" style="background:var(--primary); color:white; border:none; padding:10px 20px; cursor:pointer;">Verify Now</button>
            </div>
        </div>
    </div>

    <script>
        function clear() {
            document.querySelectorAll('.view-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        }

        function go(id) {
            clear();
            document.getElementById(id).classList.add('active');
            // This highlights the button you clicked
            event.currentTarget.classList.add('active');
        }

        function goLock(name) {
            clear();
            document.getElementById('restricted').classList.add('active');
            document.getElementById('lockTitle').innerText = name;
            event.currentTarget.classList.add('active');
        }

        function out() {
            localStorage.clear();
            window.location.replace('login.html');
        }
    </script>
</body>
</html>
