<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; --sidebar-w: 260px; --success: #00ffa3; }
        * { box-sizing: border-box; } 
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0; min-height: 100vh; color: white; display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-w); background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px); border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; padding: 30px 20px;
            height: 100vh; position: fixed; z-index: 300; transition: 0.3s ease;
        }
        .logo { font-size: 24px; font-weight: bold; display: flex; align-items: center; gap: 12px; margin-bottom: 40px; }
        .logo i { color: var(--primary); }
        .nav-item {
            display: flex; align-items: center; gap: 15px; padding: 12px 15px; border-radius: 12px;
            color: #b0b0b0; text-decoration: none; transition: 0.3s; margin-bottom: 8px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }

        /* --- MAIN CONTENT --- */
        .main-content { flex: 1; margin-left: var(--sidebar-w); padding: 40px; }
        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- RESTRICTED MESSAGE --- */
        .verification-notice {
            text-align: center; margin-top: 80px; padding: 40px;
            background: rgba(255,255,255,0.05); border-radius: 20px;
            border: 2px dashed var(--primary); max-width: 500px; margin-left: auto; margin-right: auto;
        }
        .btn-action { background: var(--primary); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; }

        @media (max-width: 992px) { .sidebar { left: -100%; } .main-content { margin-left: 0; } }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo"><i class="fa-solid fa-cloud"></i> <span>CloudTasks</span></div>
        <div class="nav-item active" onclick="showView('homeView', this)"> <i class="fa-solid fa-house"></i> Home Page </div>
        <div class="nav-item" onclick="showView('profileView', this)"> <i class="fa-solid fa-user-circle"></i> User Profile </div>
        
        <div class="nav-item" onclick="showRestricted('Available Tasks', this)"> <i class="fa-solid fa-list-check"></i> Available Tasks </div>
        <div class="nav-item" onclick="showRestricted('My Projects', this)"> <i class="fa-solid fa-spinner"></i> My Projects </div>
        <div class="nav-item" onclick="showRestricted('My Wallet', this)"> <i class="fa-solid fa-wallet"></i> My Wallet </div>
        <div class="nav-item" onclick="showRestricted('History', this)"> <i class="fa-solid fa-clock-rotate-left"></i> History </div>
        
        <div style="margin-top: auto;">
            <div class="nav-item" style="color: #e74c3c;" onclick="logoutNow()"> <i class="fa-solid fa-right-from-bracket"></i> Logout </div>
        </div>
    </div>

    <div class="main-content">
        <div id="homeView" class="view-section active">
            <h1>Welcome to CloudTasks</h1>
            <p>Dashboard is ready.</p>
        </div>

        <div id="restrictedView" class="view-section">
            <div class="verification-notice">
                <i class="fa-solid fa-circle-exclamation" style="font-size: 50px; color: #ff4d4d;"></i>
                <h2 id="sectionName">Section</h2>
                <h3 style="color: #b0b0b0;">Membership Verification Required</h3>
                <button class="btn-action" onclick="showView('profileView', document.querySelector('.fa-user-circle').parentElement)">Complete Verification</button>
            </div>
        </div>

        <div id="profileView" class="view-section">
            <h1>User Profile</h1>
            <p>Your profile information is shown here.</p>
        </div>
    </div>

    <script>
        function showView(viewId, element) {
            // Hide everything
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Show the selected one
            document.getElementById(viewId).classList.add('active');
            element.classList.add('active');
        }

        function showRestricted(name, element) {
            // Hide everything
            document.querySelectorAll('.view-section').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            // Show the Restricted View container
            const restricted = document.getElementById('restrictedView');
            restricted.classList.add('active');
            document.getElementById('sectionName').innerText = name;
            element.classList.add('active');
        }

        function logoutNow() {
            // Based on your GitHub screenshot, the file is login.html
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
