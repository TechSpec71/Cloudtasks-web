<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudtasks | Membership Hub</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .navbar { width: 100%; padding: 20px; border-bottom: 1px solid #1a1a1a; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        
        .hero { text-align: center; margin-top: 10vh; padding: 20px; }
        .btn-unlock { background: #00bcd4; color: #000; border: none; padding: 18px 45px; font-weight: 900; border-radius: 6px; cursor: pointer; font-size: 1rem; box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3); }

        #hubOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; justify-content: center; align-items: center; }
        .hub-card { background: #0d0d0d; padding: 35px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #1a1a1a; text-align: center; }

        .key-box { width: 100%; padding: 16px; background: #000; border: 1px solid #333; color: #00bcd4; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; text-align: center; outline: none; margin: 20px 0; }
        
        .method-card { width: 100%; padding: 15px; background: #161616; border: 1px solid #222; color: #fff; border-radius: 8px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
        .method-card:hover { border-color: #00bcd4; }

        #mpesaDetails { display: none; background: #002222; padding: 20px; border-radius: 10px; border: 1px solid #00bcd4; margin-bottom: 15px; text-align: left; }
    </style>
</head>
<body>

    <div class="navbar">
        <h2 style="letter-spacing: -1px;">CLOUDTASKS</h2>
        <div style="border: 1px solid #ff4757; color: #ff4757; padding: 5px 10px; border-radius: 4px; font-size: 11px; font-weight: bold;">LOCKED</div>
    </div>

    <div class="hero">
        <i class="fa-solid fa-shield-halved" style="font-size: 70px; color: #00bcd4; margin-bottom: 20px;"></i>
        <h1>Verification Required</h1>
        <p style="color: #666;">Please activate your membership to access server-side tasks.</p>
        <button class="btn-unlock" onclick="openHub()">GET ACCESS NOW</button>
    </div>

    <div id="hubOverlay">
        <div class="hub-card">
            <h2 style="margin:0;">Membership Hub</h2>
            <p style="font-size: 12px; color: #555; margin: 10px 0 20px 0;">Standard Annual Key: <b>$25.00 USD</b></p>
            
            <input type="text" id="mKey" class="key-box" placeholder="Enter Membership Key">
            <button class="btn-unlock" style="width:100%; margin-bottom: 25px;" onclick="checkKey()">VERIFY KEY</button>

            <div style="margin-bottom: 15px; font-size: 10px; color: #333; letter-spacing: 2px; font-weight: bold;">PAYMENT METHODS</div>

            <div class="method-card" onclick="toggleMpesa()" style="border-left: 4px solid #2ecc71;">
                <span style="font-weight: bold;">Mobile Money (Local)</span>
                <i class="fa-solid fa-mobile-button" style="color: #2ecc71;"></i>
            </div>
            
            <div id="mpesaDetails">
                <p style="margin:0; font-size: 11px; color: #00bcd4; font-weight: bold;">LIPA NA M-PESA</p>
                <p style="margin:12px 0 4px 0;">Paybill: <b>542542</b></p>
                <p style="margin:0;">Account: <b>05508726426150</b></p>
            </div>

            <div class="method-card" onclick="alert('PayPal is currently unavailable in your region.')">
                <span>PayPal</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" height="15">
            </div>

            <p onclick="closeHub()" style="margin-top: 20px; color: #444; cursor: pointer; font-size: 12px;">Go Back</p>
        </div>
    </div>

    <script>
        function openHub() { document.getElementById('hubOverlay').style.display = 'flex'; }
        function closeHub() { document.getElementById('hubOverlay').style.display = 'none'; }
        function toggleMpesa() {
            const d = document.getElementById('mpesaDetails');
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }
        function checkKey() {
            const k = document.getElementById('mKey').value.trim();
            if (k === "ABKNOVA:C433") {
                alert("This key is currently in a queue. Please wait for activation.");
            } else {
                alert("Invalid or expired key. Please use the Mobile Money option to acquire a new one.");
            }
        }
    </script>
</body>
</html>
