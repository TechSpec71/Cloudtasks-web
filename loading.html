<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudtasks | Membership v2.0</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* BRAND NEW STYLES - NO TRACES OF OLD PURPLE MODALS */
        body { margin: 0; background: #000 !important; color: #fff; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .nav-bar { width: 100%; padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; box-sizing: border-box; }
        .status-pill { border: 1px solid #ff4757; color: #ff4757; padding: 5px 12px; border-radius: 4px; font-size: 11px; font-weight: 800; letter-spacing: 1px; }

        .hero-section { text-align: center; margin-top: 15vh; padding: 20px; }
        .btn-trigger { background: #00bcd4; color: #000; border: none; padding: 18px 45px; font-weight: 900; border-radius: 6px; cursor: pointer; font-size: 1rem; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 188, 212, 0.3); }

        /* FULL SCREEN HUB OVERLAY */
        #membershipHub { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999999; justify-content: center; align-items: center; }
        .hub-container { background: #0d0d0d; padding: 35px; border-radius: 15px; width: 90%; max-width: 400px; border: 1px solid #1a1a1a; text-align: center; }

        /* Key Verification Area */
        .input-group { position: relative; margin: 25px 0; }
        .key-box { width: 100%; padding: 16px; background: #000; border: 1px solid #333; color: #00bcd4; border-radius: 8px; box-sizing: border-box; font-family: monospace; font-size: 1.1rem; text-align: center; outline: none; }
        .key-box:focus { border-color: #00bcd4; }
        .submit-arrow { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #00bcd4; cursor: pointer; font-size: 1.3rem; border: none; background: none; }

        /* Global Payment Buttons (The Illusion) */
        .option-card { width: 100%; padding: 15px 20px; background: #161616; border: 1px solid #222; color: #fff; border-radius: 8px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: 0.2s; }
        .option-card:hover { border-color: #00bcd4; background: #1a1a1a; }
        .option-card img { height: 18px; }

        /* Local Payment Box */
        #mpesaDetails { display: none; background: #002222; padding: 20px; border-radius: 10px; border: 1px solid #00bcd4; margin-bottom: 15px; text-align: left; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="nav-bar">
        <h2 style="margin:0; letter-spacing: -1px;">CLOUDTASKS</h2>
        <div class="status-pill">LOCKED</div>
    </div>

    <div class="hero-section">
        <i class="fa-solid fa-user-shield" style="font-size: 70px; color: #00bcd4; margin-bottom: 20px;"></i>
        <h1>Account Restricted</h1>
        <p style="color: #666;">Unlock global tasks and daily server-side payouts.</p>
        <button class="btn-trigger" onclick="openHub()">GET ACCESS NOW</button>
    </div>

    <div id="membershipHub">
        <div class="hub-container">
            <h2 style="margin:0; color: #fff;">Membership Hub</h2>
            <p style="font-size: 12px; color: #555; margin: 10px 0 25px 0;">Standard Annual Key: <b>$25.00 USD</b></p>
            
            <div class="input-group">
                <input type="text" id="membershipKey" class="key-box" placeholder="Enter Membership Key">
                <button class="submit-arrow" onclick="verifyNow()"><i class="fa-solid fa-circle-arrow-right"></i></button>
            </div>

            <div style="margin: 25px 0; font-size: 10px; color: #333; letter-spacing: 2px; font-weight: bold;">OR ACQUIRE KEY</div>

            <div class="option-card" onclick="toggleMpesa()" style="border-left: 4px solid #2ecc71;">
                <span style="font-size: 14px; font-weight: bold;">Mobile Money (Local)</span>
                <i class="fa-solid fa-mobile-button" style="color: #2ecc71;"></i>
            </div>
            
            <div id="mpesaDetails">
                <p style="margin:0; font-size: 11px; color: #00bcd4; font-weight: bold;">MERCHANT PAYMENT DETAILS</p>
                <p style="margin:12px 0 4px 0;">Paybill: <b>542542</b></p>
                <p style="margin:0;">Account: <b>05508726426150</b></p>
            </div>

            <div class="option-card" onclick="gateError('PayPal')">
                <span style="font-size: 14px;">PayPal</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/PayPal.svg" alt="PayPal">
            </div>
            <div class="option-card" onclick="gateError('Visa/Mastercard')">
                <span style="font-size: 14px;">Credit / Debit Card</span>
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/5e/Visa_Inc._logo.svg" alt="Visa">
            </div>
            <div class="option-card" onclick="gateError('Apple Pay')">
                <span style="font-size: 14px;">Apple Pay</span>
                <i class="fa-brands fa-apple-pay" style="font-size: 26px;"></i>
            </div>

            <p onclick="closeHub()" style="margin-top: 25px; color: #444; cursor: pointer; font-size: 12px; font-weight: 600;">Go Back</p>
        </div>
    </div>

    <script>
        // 🚀 THE CACHE-BUSTER: Forces a refresh if the version is old
        (function() {
            const currentVersion = "2.0";
            const savedVersion = localStorage.getItem('site_version');
            if (savedVersion !== currentVersion) {
                localStorage.setItem('site_version', currentVersion);
                location.reload(true); // Force clear cache reload
            }
        })();

        function openHub() { document.getElementById('membershipHub').style.display = 'flex'; }
        function closeHub() { document.getElementById('membershipHub').style.display = 'none'; }
        
        function toggleMpesa() {
            const div = document.getElementById('mpesaDetails');
            div.style.display = (div.style.display === 'block') ? 'none' : 'block';
        }

        function verifyNow() {
            const k = document.getElementById('membershipKey').value.trim();
            if (k === "ABKNOVA:C433") {
                alert("NOTICE: This key is currently under review due to high volume. Please wait or use an alternative key.");
            } else if (k === "") {
                alert("Please provide a valid key.");
            } else {
                alert("ACCESS DENIED: The membership key provided is not recognized.");
            }
        }

        function gateError(method) {
            alert("SECURITY ALERT: The " + method + " gateway is temporarily unavailable in your region. Please complete your registration via the 'Mobile Money (Local)' option.");
        }
    </script>
</body>
</html>
