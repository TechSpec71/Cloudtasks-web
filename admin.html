<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudtasks | Admin Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #0a0e14; color: white; padding: 40px; }
        .container { max-width: 1100px; margin: auto; background: #151b23; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        .table-responsive { width: 100%; overflow-x: auto; margin-top: 20px; border-radius: 8px; }
        
        h2 { border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; display: flex; justify-content: space-between; align-items: center; }
        #login-section { display: flex; gap: 10px; margin-bottom: 20px; }
        #admin-controls { display: none; margin-bottom: 20px; justify-content: space-between; align-items: center; }
        
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 4px; flex: 1; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 13px; }
        th, td { padding: 12px; border-bottom: 1px solid #30363d; text-align: left; }
        th { background: #161b22; color: #7c4dff; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-login { background: #7c4dff; color: white; }
        .btn-accept { background: #238636; color: white; }
        .btn-reject { background: #da3633; color: white; margin-left: 5px; }
        .btn-refresh { background: #00ffa3; color: #0a0e14; }
        
        .id-link, .selfie-link { color: #00ffa3; text-decoration: none; font-weight: bold; }
        .pay-code { color: #ffca28; font-family: monospace; font-size: 14px; }
        #last-updated { font-size: 12px; color: #8b949e; }
    </style>
</head>
<body>
    <div class="container">
        <h2>
            Cloudtasks Applicant Manager
            <span id="last-updated"></span>
        </h2>
        
        <div id="login-section">
            <input type="text" id="adminUser" placeholder="Admin Username">
            <input type="password" id="adminPass" placeholder="Admin Password">
            <button class="btn-login" onclick="loadApplicants()">Login</button>
        </div>

        <div id="admin-controls">
            <button class="btn-refresh" onclick="loadApplicants()">Refresh Now</button>
            <button class="btn-reject" style="background: #444;" onclick="logout()">Logout</button>
        </div>

        <div class="table-responsive">
            <table id="adminTable" style="display:none;">
                <thead>
                    <tr>
                        <th>Name / Phone</th>
                        <th>Email</th>
                        <th>Referral Code</th>
                        <th>Education</th>
                        <th>ID Doc</th>
                        <th>Live Selfie</th>
                        <th>Payment Code</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="applicantList"></tbody>
            </table>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        let lastCount = 0;

        async function loadApplicants(isAuto = false) {
            let user = document.getElementById('adminUser').value;
            let pass = document.getElementById('adminPass').value;

            if (!user || !pass) {
                user = localStorage.getItem('adminUser');
                pass = localStorage.getItem('adminPass');
            }
            
            if(!user || !pass) return;

            try {
                const response = await fetch('/api/admin/users', {
                    method: 'GET',
                    headers: { 
                        'Content-Type': 'application/json',
                        'admin-user': user, 
                        'admin-pass': pass
                    }
                });

                if (response.ok) {
                    const users = await response.json();
                    
                    if (isAuto && users.length > lastCount && lastCount !== 0) {
                        document.getElementById('notifSound').play();
                    }
                    lastCount = users.length;

                    localStorage.setItem('adminUser', user);
                    localStorage.setItem('adminPass', pass);

                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('admin-controls').style.display = 'flex';
                    document.getElementById('adminTable').style.display = 'table';
                    document.getElementById('last-updated').innerText = "Last Updated: " + new Date().toLocaleTimeString();
                    
                    const list = document.getElementById('applicantList');
                    list.innerHTML = '';
                    
                    users.forEach(u => {
                        const displayName = u.fullName || "Not Set";
                        const displayPhone = u.phoneNumber || "";
                        const referral = u.referralCode || "N/A";
                        const idLink = u.idPhotoPath ? `<a href="${u.idPhotoPath}" target="_blank" class="id-link">View ID</a>` : "---";
                        const selfieLink = u.selfiePath ? `<a href="${u.selfiePath}" target="_blank" class="selfie-link">View Selfie</a>` : "---";
                        const payCode = u.paymentRef ? `<span class="pay-code">${u.paymentRef}</span>` : "---";

                        list.innerHTML += `
                            <tr>
                                <td><strong>${displayName}</strong><br><small>${displayPhone}</small></td>
                                <td>${u.email}</td>
                                <td>${referral}</td>
                                <td>${u.education || 'N/A'}</td>
                                <td>${idLink}</td>
                                <td>${selfieLink}</td>
                                <td>${payCode}</td>
                                <td>${u.status || 'Pending'}</td>
                                <td>
                                    <button class="btn-accept" onclick="updateStatus('${u.email}', 'Accepted')">Verify</button>
                                    <button class="btn-reject" onclick="updateStatus('${u.email}', 'Rejected')">Remove</button>
                                </td>
                            </tr>`;
                    });
                } else if (!isAuto) {
                    alert("Unauthorized Access!");
                }
            } catch (err) {
                console.error(err);
                if(!isAuto) alert("Server error connecting to database.");
            }
        }

        async function updateStatus(email, status) {
            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, status })
            });

            if (res.ok) {
                alert("User " + status + " successfully!");
                loadApplicants(true); 
            }
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        setInterval(() => loadApplicants(true), 30000);

        window.onload = () => {
            if (localStorage.getItem('adminUser')) {
                loadApplicants(true);
            }
        };
    </script>
</body>
</html>
