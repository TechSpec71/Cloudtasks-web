<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cloudtasks | Admin Portal</title>
    <style>
        body { font-family: sans-serif; background: #0a0e14; color: white; padding: 40px; }
        .container { max-width: 800px; margin: auto; background: #151b23; padding: 20px; border-radius: 8px; border: 1px solid #30363d; }
        h2 { border-bottom: 1px solid #30363d; padding-bottom: 10px; margin-top: 0; }
        #login-section { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: #0d1117; border: 1px solid #30363d; color: white; padding: 8px; border-radius: 4px; flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border-bottom: 1px solid #30363d; text-align: left; }
        th { background: #161b22; }
        button { cursor: pointer; padding: 8px 12px; border: none; border-radius: 4px; font-weight: bold; transition: 0.2s; }
        .btn-login { background: #7c4dff; color: white; }
        .btn-accept { background: #238636; color: white; }
        .btn-accept:hover { background: #2ea043; }
        .btn-reject { background: #da3633; color: white; margin-left: 10px; }
        .btn-reject:hover { background: #f85149; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Cloudtasks Applicant Manager</h2>
        
        <div id="login-section">
            <input type="text" id="adminUser" placeholder="Admin Username">
            <input type="password" id="adminPass" placeholder="Admin Password">
            <button class="btn-login" onclick="loadApplicants()">Login</button>
        </div>

        <table id="adminTable" style="display:none;">
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Membership</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="applicantList"></tbody>
        </table>
    </div>

    <script>
        async function loadApplicants() {
            const user = document.getElementById('adminUser').value;
            const pass = document.getElementById('adminPass').value;
            
            // Simple check to prevent empty clicks
            if(!user || !pass) return alert("Please enter credentials");

            try {
                const response = await fetch('/api/admin/users', {
                    method: 'GET', // Changed to GET as per standard admin fetch
                    headers: { 
                        'Content-Type': 'application/json',
                        'admin-user': user, // Optional: Passing as headers for security
                        'admin-pass': pass
                    }
                });

                if (response.ok) {
                    const users = await response.json();
                    document.getElementById('login-section').style.display = 'none';
                    document.getElementById('adminTable').style.display = 'table';
                    
                    const list = document.getElementById('applicantList');
                    list.innerHTML = '';
                    
                    users.forEach(u => {
                        list.innerHTML += `
                            <tr>
                                <td>${u.email}</td>
                                <td>${u.isVerified ? '✅ Paid' : '❌ Pending'}</td>
                                <td>${u.status || 'Registered'}</td>
                                <td>
                                    <button class="btn-accept" onclick="updateStatus('${u.email}', 'Accepted')">Verify</button>
                                    <button class="btn-reject" onclick="updateStatus('${u.email}', 'Rejected')">Remove</button>
                                </td>
                            </tr>`;
                    });
                } else {
                    alert("Unauthorized Access!");
                }
            } catch (err) {
                console.error(err);
                alert("Server error connecting to database.");
            }
        }

        async function updateStatus(email, status) {
            const res = await fetch('/api/admin/update-status', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, status })
            });

            if (res.ok) {
                alert("User " + status + " successfully!");
                loadApplicants(); // Refresh list to show changes
            }
        }
    </script>
</body>
</html>
