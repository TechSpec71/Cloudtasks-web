<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://js.paystack.co/v1/inline.js"></script>
    <style>
        :root { --primary: #7c4dff; --bg: #1a1a2e; --sidebar-w: 260px; --success: #00ffa3; }
        
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            margin: 0; min-height: 100vh; color: white;
            display: flex;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: var(--sidebar-w);
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(15px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column;
            padding: 30px 20px;
            height: 100vh; position: fixed;
            box-sizing: border-box; z-index: 100;
        }

        .logo {
            font-size: 24px; font-weight: bold; display: flex;
            align-items: center; gap: 12px; color: white;
            text-decoration: none; margin-bottom: 40px;
        }
        .logo i { color: var(--primary); font-size: 28px; }

        .nav-item {
            display: flex; align-items: center; gap: 15px;
            padding: 12px 15px; border-radius: 12px;
            color: #b0b0b0; text-decoration: none;
            transition: 0.3s; margin-bottom: 8px; cursor: pointer;
        }
        .nav-item:hover, .nav-item.active { background: var(--primary); color: white; }
        .nav-item i { width: 20px; text-align: center; }

        /* --- MAIN CONTENT AREA --- */
        .main-content {
            flex: 1; margin-left: var(--sidebar-w);
            padding: 40px; min-height: 100vh;
            box-sizing: border-box;
        }

        .view-section { display: none; }
        .view-section.active { display: block; }

        /* --- TASK GRID STYLES --- */
        .task-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px; margin-top: 20px;
        }

        .task-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px; padding: 25px;
            transition: 0.3s ease; position: relative;
        }
        .task-card:hover { transform: translateY(-5px); border-color: var(--primary); background: rgba(255, 255, 255, 0.08); }
        
        .task-card .loc { font-size: 11px; color: var(--primary); text-transform: uppercase; letter-spacing: 1px; font-weight: bold; }
        .task-card h3 { font-size: 16px; margin: 10px 0; height: 40px; overflow: hidden; }
        .task-card .price { font-size: 20px; color: var(--success); font-weight: bold; margin-bottom: 15px; }

        /* --- PROFILE CARD STYLES --- */
        .container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 30px; width: 100%; max-width: 900px;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 40px;
            position: relative; transition: 0.3s ease; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }
        .glass-card:hover { transform: translateY(-5px); border-color: var(--primary); }
        
        .number-tag {
            position: absolute; top: -15px; left: -15px; background: var(--primary);
            width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center;
            justify-content: center; font-weight: bold; font-size: 18px;
        }

        h3 { margin: 15px 0 10px; text-transform: uppercase; font-size: 18px; color: #fff; }
        p { font-size: 14px; color: #b0b0b0; line-height: 1.6; margin-bottom: 20px; }
        .icon { font-size: 24px; color: var(--primary); margin-bottom: 10px; }
