<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudtasks | Register</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .dash-logo { font-size: 22px; font-weight: bold; display: flex; align-items: center; gap: 10px; color: white; text-decoration: none; }
        .dash-logo i { color: #7c4dff; font-size: 26px; }
    </style>
    <style>
        :root { --primary: #6c5ce7; --secondary: #a29bfe; --glass: rgba(255,255,255,0.1); }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #fff; display: flex; flex-direction: column; }
        header { padding: 1.5rem 5%; display: flex; align-items: center; background: rgba(0,0,0,0.2); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .logo-container { display: flex; align-items: center; gap: 12px; }
        .cloud-svg { width: 40px; height: 40px; color: var(--primary); }
        .logo-text { display: flex; flex-direction: column; line-height: 1; }
        .main-word { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .sub-word { font-size: 10px; font-weight: bold; letter-spacing: 4px; color: var(--secondary); }
        .main-wrapper { flex: 1; display: flex; justify-content: center; align-items: center; padding: 40px 20px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; padding: 40px; width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; }
        h2 { margin-bottom: 8px; font-weight: 600; }
        .subtitle { color: var(--secondary); font-size: 0.9rem; margin-bottom: 28px; }
        input { width: 100%; padding: 14px; margin: 8px 0; border-radius: 10px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: white; font-size: 1rem; box-sizing: border-box; }
        input::placeholder { color: rgba(255,255,255,0.4); }
        button { width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 1rem; cursor: pointer; transition: 0.3s; }
        button:hover { background: #5b4bc4; transform: translateY(-2px); }
        button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .back-link { margin-top: 18px; display: block; color: var(--secondary); text-decoration: none; font-size: 0.9rem; }
        .msg { margin-top: 14px; font-size: 0.9rem; min-height: 20px; }
        .msg.success { color: #00ffa3; }
        .msg.error { color: #ff6b6b; }
    </style>
</head>
<body>
<header>
    <div class="dash-logo">
        <i class="fa-solid fa-cloud"></i>
        <span>CloudTasks</span>
    </div>
</header>
<div class="main-wrapper">
    <div class="glass-card">
        <h2>Create Account</h2>
        <p class="subtitle">Enter your email and a password to get started.</p>
        <input type="email" id="email" placeholder="Email Address">
        <input type="password" id="password" placeholder="Password">
        <button id="registerBtn" onclick="handleRegister()">Create Account</button>
        <div id="msg" class="msg"></div>
        <a href="login.html" class="back-link">Already have an account? Login</a>
    </div>
</div>
<script>
    async function handleRegister() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const msg = document.getElementById('msg');
        const btn = document.getElementById('registerBtn');

        if (!email || !password) {
            msg.className = 'msg error';
            msg.textContent = 'Please enter both email and password.';
            return;
        }
        if (password.length < 6) {
            msg.className = 'msg error';
            msg.textContent = 'Password must be at least 6 characters.';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Creating account...';
        msg.textContent = '';

        try {
            const formData = new FormData();
            formData.append('email', email);
            formData.append('password', password);

            const res = await fetch('/api/register', { method: 'POST', body: formData });
            const data = await res.json();

            if (res.ok) {
                msg.className = 'msg success';
                msg.textContent = 'Registration successful! Redirecting to login...';
                setTimeout(() => window.location.href = '/login.html', 2000);
            } else {
                msg.className = 'msg error';
                msg.textContent = data.message || 'Registration failed. Please try again.';
                btn.disabled = false;
                btn.textContent = 'Create Account';
            }
        } catch (err) {
            msg.className = 'msg error';
            msg.textContent = 'Network error. Please try again.';
            btn.disabled = false;
            btn.textContent = 'Create Account';
        }
    }
</script>
</body>
</html>
