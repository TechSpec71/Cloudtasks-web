<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CloudTasks - Secure Workspace</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.all.min.css">
    <style>
        :root {
            --bg: #1a1a2e;
            --card: #16213e;
            --accent: #7b61ff;
            --text: #ffffff;
        }
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        nav {
            width: 90%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1.5rem;
            font-weight: bold;
        }
        .auth-container {
            background: var(--card);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            text-align: center;
            margin-top: 50px;
        }
        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 8px;
            border: none;
            background: #0f3460;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }
        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #bbb;
        }
        .toggle-text span {
            color: var(--accent);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <i class="fa-solid fa-cloud"></i>
            <span>CloudTasks</span>
        </div>
    </nav>

    <div class="auth-container" id="auth-section">
        <h2 id="auth-title">Create Account</h2>
        <p>Join CloudTasks to manage your goals</p>
        
        <input type="email" id="emailInput" placeholder="EMAIL ADDRESS">
        <input type="password" id="passInput" placeholder="PASSWORD">
        
        <button id="submit-btn" onclick="handleAuth()">Get Started</button>
        
        <div class="toggle-text">
            <span id="toggle-link" onclick="toggleMode()">Already have an account? Click here</span>
        </div>
    </div>

    <script>
        let isLoginMode = false;

        function toggleMode() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('auth-title');
            const btn = document.getElementById('submit-btn');
            const link = document.getElementById('toggle-link');

            if (isLoginMode) {
                title.innerText = "Login";
                btn.innerText = "Login";
                link.innerText = "Don't have an account? Sign up";
            } else {
                title.innerText = "Create Account";
                btn.innerText = "Get Started";
                link.innerText = "Already have an account? Click here";
            }
        }

        async function handleAuth() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passInput').value;

            if (!email || !password) {
                return alert("Please fill in all fields.");
            }

            const endpoint = isLoginMode ? '/api/login' : '/api/send-otp';
            
            try {
                const response = await fetch(endpoint}
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    alert(isLoginMode ? "Login successful!" : "OTP sent! Check your email.");
                } else {
                    alert(data.message || "Something went wrong.");
                }
            } catch (error) {
                console.error("Auth Error:", error);
                alert("Could not connect to the server.");
            }
        }
    </script>
</body>
</html>
