<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloudtasks | Login</title>
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #a29bfe;
            --glass: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            min-height: 100vh;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
        }

        /* Header & Logo - Matching Landing Page */
        header {
            padding: 1.5rem 5%;
            display: flex;
            align-items: center;
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .logo-container { display: flex; align-items: center; gap: 12px; }
        .cloud-svg { width: 40px; height: 40px; color: var(--primary); }
        .logo-text { display: flex; flex-direction: column; line-height: 1; }
        .main-word { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .sub-word { font-size: 10px; font-weight: bold; letter-spacing: 4px; color: var(--secondary); }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        h2 { margin-bottom: 30px; font-weight: 600; }

        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
            color: white;
            font-size: 1rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 16px;
            margin-top: 20px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #5b4bc4; transform: translateY(-2px); }

        .back-link {
            margin-top: 20px;
            display: block;
            color: var(--secondary);
            text-decoration: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <svg class="cloud-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M17.5 19c2.5 0 4.5-2 4.5-4.5 0-2-1.5-3.5-3.5-4-0.5-3-3-5.5-6-5.5s-5.5 2.5-6 5.5c-2 0.5-3.5 2-3.5 4 0 2.5 2 4.5 4.5 4.5" />
        </svg>
        <div class="logo-text">
            <span class="main-word">CLOUD</span>
            <span class="sub-word">TASKS</span>
        </div>
    </div>
</header>

<div class="main-wrapper">
    <div class="glass-card">
        <h2>Welcome Back</h2>
        <input type="email" id="loginEmail" placeholder="Email Address">
        <input type="password" id="loginPass" placeholder="Password">
        <button onclick="handleLogin()">Login</button>
        <a href="index.html" class="back-link">Don't have an account? Register</a>
    </div>
</div>

<script>
    async function handleLogin() {
        const email = document.getElementById('loginEmail').value;
        const pass = document.getElementById('loginPass').value;

        if(!email || !pass) return alert("Please fill in all fields.");

        // We will create this /api/login endpoint in the next step
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ email, password: pass })
        });

        const data = await res.json();
        if(res.ok) {
            window.location.href = data.redirect || '/dashboard.html';
        } else {
            alert(data.message || "Invalid email or password.");
        }
    }
</script>

</body>
</html>
